<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Arcane | Unblocked Games</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#050505',
                            green: '#00FF41',
                            surface: '#111111',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Anton', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-brand-black text-white antialiased overflow-x-hidden;
                font-family: 'Inter', sans-serif;
            }
        }
        .heading-bold {
            @apply font-black italic uppercase tracking-tighter leading-[0.8];
        }
        .caps-meta {
            @apply text-[11px] tracking-[0.4em] font-bold uppercase;
        }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { @apply bg-brand-black; }
        ::-webkit-scrollbar-thumb { @apply bg-white/10 border-4 border-brand-black hover:bg-brand-green transition-colors; }
        .game-card:hover .thumb { transform: scale(1.05); filter: grayscale(0); }
        .thumb { filter: grayscale(100%); transition: all 0.5s ease; }
    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
</head>
<body class="min-h-screen flex flex-col font-sans border-8 border-white/5">

    <header class="flex flex-col md:flex-row justify-between items-end p-8 md:p-12 pb-8 gap-8">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-2">
                <span class="h-3 w-3 bg-brand-green rounded-full shadow-[0_0_10px_#00FF41]"></span>
                <span class="caps-meta text-white/50">System Online</span>
            </div>
            <h1 class="text-6xl md:text-8xl heading-bold">
                Nova<br/><span class="text-brand-green">Arcane</span>
            </h1>
        </div>

        <div class="w-full md:w-[400px] mb-2">
            <div class="relative group">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="FIND A TITLE..." 
                    class="w-full bg-white/5 border-b-4 border-white/20 p-4 pt-6 focus:border-brand-green outline-none text-2xl font-black placeholder:text-white/10 transition-all uppercase italic"
                >
                <div class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-brand-green">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>
    </header>

    <nav id="category-bar" class="px-8 md:px-12 py-6 border-y border-white/10 flex flex-wrap items-center gap-x-10 gap-y-4">
        <!-- Categories injected here -->
    </nav>

    <main class="flex-1 px-8 md:px-12 py-12">
        <div class="flex items-baseline justify-between mb-12">
            <h2 id="current-category-label" class="text-4xl font-black italic uppercase tracking-tight">Latest Releases</h2>
            <div class="flex items-center gap-2">
                <span class="h-1 w-8 bg-brand-green"></span>
                <p id="game-count" class="caps-meta text-white/20">0 Records Found</p>
            </div>
        </div>

        <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Games injected here -->
        </div>

        <div id="no-results" class="hidden py-20 text-center border-2 border-dashed border-white/5 rounded-3xl">
            <h3 class="text-3xl heading-bold opacity-20">No data detected</h3>
            <p class="caps-meta text-white/10 mt-4">Initialize new search parameters</p>
        </div>
    </main>

    <footer class="p-8 md:p-12 pt-0 text-white/10">
        <div class="border-t border-white/10 pt-8 flex justify-between items-center">
            <div class="flex gap-10">
                <span class="caps-meta">UNBLOCKED HUB</span>
                <span class="caps-meta">SECURITY CLEARANCE LEVEL 4</span>
            </div>
            <div class="caps-meta">ARCANE.CORE.v2.5.0 &copy; 2026</div>
        </div>
    </footer>

    <!-- Game Modal -->
    <div id="game-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
        <div class="relative bg-brand-surface border-4 border-white/10 flex flex-col w-full max-w-6xl h-[90vh] rounded-3xl overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between p-6 border-b border-white/10 bg-brand-surface">
                <div class="flex items-center gap-4">
                    <h2 id="modal-title" class="text-3xl font-black italic uppercase tracking-tighter leading-none text-white">GAME TITLE</h2>
                    <span id="modal-category" class="hidden sm:inline-block caps-meta text-brand-green">SECTOR: ARCADE</span>
                </div>
                <div class="flex items-center gap-4">
                    <button id="modal-reload" class="caps-meta text-white/30 hover:text-brand-green">REBOOT</button>
                    <button id="modal-close" class="px-4 py-2 bg-white/5 hover:bg-brand-green hover:text-black caps-meta transition-all">CLOSE</button>
                </div>
            </div>
            <div class="flex-1 bg-black relative">
                <iframe id="game-iframe" class="w-full h-full border-0" allowfullscreen></iframe>
            </div>
            <div class="p-6 border-t border-white/10 bg-brand-surface flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="h-1 w-6 bg-brand-green"></span>
                    <p id="modal-desc" class="caps-meta text-white/30">Description loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let games = [];
        let currentCategory = 'All';
        let searchQuery = '';

        const categories = ['All', 'Puzzle', 'Action', 'Arcade', 'Retro'];

        // Initial Load
        async function init() {
            try {
                const response = await fetch('./src/games.json');
                games = await response.json();
                renderCategories();
                renderGames();
            } catch (err) {
                console.error("Failed to load games data:", err);
            }
        }

        function renderCategories() {
            const bar = document.getElementById('category-bar');
            bar.innerHTML = categories.map(cat => `
                <button 
                    onclick="setCategory('${cat}')"
                    class="text-[11px] font-black uppercase tracking-[0.2em] transition-colors ${currentCategory === cat ? 'text-brand-green' : 'text-white/30 hover:text-white'}"
                >
                    ${cat} TITLES
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.getElementById('current-category-label').innerText = cat === 'All' ? 'Latest Releases' : `Sector: ${cat}`;
            renderCategories();
            renderGames();
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderGames();
        });

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const filtered = games.filter(g => {
                const matchesSearch = g.title.toLowerCase().includes(searchQuery) || g.description.toLowerCase().includes(searchQuery);
                const matchesCat = currentCategory === 'All' || g.category === currentCategory;
                return matchesSearch && matchesCat;
            });

            document.getElementById('game-count').innerText = `${filtered.length} RECORDS FOUND`;
            document.getElementById('no-results').classList.toggle('hidden', filtered.length > 0);

            grid.innerHTML = filtered.map(game => `
                <div onclick='openGame(${JSON.stringify(game).replace(/'/g, "&apos;")})' class="game-card group relative bg-brand-surface rounded-xl overflow-hidden border border-white/10 cursor-pointer transition-all hover:border-brand-green">
                    <div class="aspect-video overflow-hidden relative">
                        <img src="${game.thumbnail}" alt="${game.title}" class="thumb w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-brand-black via-transparent to-transparent opacity-60"></div>
                    </div>
                    <div class="p-6">
                        <div class="h-1.5 w-full bg-white/5 mb-4 rounded-full overflow-hidden">
                            <div class="h-full bg-white/20 w-full animate-pulse"></div>
                        </div>
                        <h3 class="text-xl font-black italic uppercase leading-none group-hover:text-brand-green transition-colors">${game.title}</h3>
                        <span class="text-[10px] text-brand-green font-bold uppercase mt-2 tracking-widest block">${game.category}</span>
                    </div>
                </div>
            `).join('');
        }

        function openGame(game) {
            const modal = document.getElementById('game-modal');
            const iframe = document.getElementById('game-iframe');
            document.getElementById('modal-title').innerText = game.title;
            document.getElementById('modal-category').innerText = `SECTOR: ${game.category}`;
            document.getElementById('modal-desc').innerText = game.description;
            iframe.src = game.url;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('modal-close').addEventListener('click', () => {
            const modal = document.getElementById('game-modal');
            const iframe = document.getElementById('game-iframe');
            iframe.src = '';
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        });

        document.getElementById('modal-reload').addEventListener('click', () => {
            const iframe = document.getElementById('game-iframe');
            const src = iframe.src;
            iframe.src = '';
            setTimeout(() => iframe.src = src, 10);
        });

        init();
    </script>
</body>
</html>
